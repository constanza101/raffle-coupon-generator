<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Cupones para Rifa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

    .app { max-width: 860px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }

    .panel { background: white; border: 1px solid #e0e0d8; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .panel h3 { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 540px) { .grid2, .grid3 { grid-template-columns: 1fr; } }

    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input[type=text], input[type=number], select {
      width: 100%; padding: 8px 10px; font-size: 14px;
      border: 1px solid #d0d0c8; border-radius: 8px;
      background: white; color: #1a1a1a; outline: none;
    }
    input:focus, select:focus { border-color: #555; }
    input[type=color] {
      width: 100%; height: 36px; border: 1px solid #d0d0c8;
      border-radius: 8px; cursor: pointer; padding: 2px;
    }

    .lang-switcher {
      display: flex; gap: 6px; margin-bottom: 1.5rem;
    }
    .lang-btn {
      padding: 5px 14px; font-size: 13px; font-weight: 500;
      border: 1px solid #d0d0c8; border-radius: 20px;
      cursor: pointer; background: white; color: #555;
      transition: all 0.15s;
    }
    .lang-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 1.25rem 0; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; font-size: 14px; font-weight: 500;
      border: 1px solid #d0d0c8; border-radius: 8px;
      cursor: pointer; background: white; color: #1a1a1a;
      transition: background 0.15s;
    }
    .btn:hover { background: #f0f0eb; }
    .btn-primary { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    .btn-primary:hover { background: #2d2d4e; }

    .preview-wrap { background: #888; padding: 16px; border-radius: 8px; }
    .preview-label { font-size: 12px; color: #ddd; margin-bottom: 8px; }

    .a4-page {
      width: 100%;
      background: white;
      display: grid;
      padding: 8mm;
      gap: 0;
      margin-bottom: 12px;
      page-break-after: always;
    }

    .coupon {
      border: 0.5px solid #999;
      border-radius: 0;
      display: flex;
      overflow: hidden;
      background: white;
    }
    .coupon-band {
      flex: 0 0 52px;
      display: flex; align-items: center; justify-content: center;
      writing-mode: vertical-rl; transform: rotate(180deg);
      font-size: 9px; font-weight: 700; letter-spacing: 1px; color: white;
    }
    .coupon-main { flex: 1; padding: 5px 8px; }
    .coupon-org  { font-size: 8px; font-weight: 600; letter-spacing: 0.4px; margin-bottom: 2px; }
    .coupon-number { font-size: 15px; font-weight: 700; line-height: 1.1; }
    .coupon-name   { font-size: 8px; color: #888; margin-bottom: 4px; }
    .coupon-fields { display: grid; }
    .coupon-field  { display: flex; align-items: flex-end; gap: 4px; }
    .field-label   { font-size: 8px; font-weight: 600; color: #666; width: 48px; flex-shrink: 0; white-space: nowrap; }
    .field-line    { flex: 1; border-bottom: 0.75px solid #aaa; height: 14.5px; }
    .coupon-stub {
      flex: 0 0 34px;
      display: flex; align-items: center; justify-content: center;
      border-left: 0.5px solid #999;
    }
    .stub-num {
      font-size: 11px; font-weight: 700;
      writing-mode: vertical-rl; transform: rotate(180deg);
    }

    @media print {
      @page { margin: 0; size: A4; }
      body { background: white; margin: 0; padding: 0; }
      .app > *:not(#previewArea) { display: none !important; }
      .preview-wrap { background: none; padding: 0; margin: 0; }
      .preview-label { display: none; }
      .a4-page {
        width: 210mm; height: 297mm;
        aspect-ratio: unset;
        padding: 8mm; gap: 0;
        margin: 0;
        page-break-after: always;
        break-after: page;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <h1 data-i18n="title"></h1>
  <p class="subtitle" data-i18n="subtitle"></p>

  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('es')">Español</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>

  <div class="panel">
    <h3 data-i18n="sectionEvent"></h3>
    <div class="grid2">
      <div>
        <label data-i18n="labelNombre"></label>
        <input type="text" id="rifaNombre" value="Sorteo por nuestro 35 aniversario" />
      </div>
      <div>
        <label data-i18n="labelOrg"></label>
        <input type="text" id="rifaOrg" value="LT PERFUMERIA" />
      </div>
      <div>
        <label data-i18n="labelDesde"></label>
        <input type="number" id="numDesde" value="1" min="1" />
      </div>
      <div>
        <label data-i18n="labelCantidad"></label>
        <input type="number" id="cantidad" value="10" min="1" max="500" />
      </div>
    </div>
  </div>

  <div class="panel">
    <h3 data-i18n="sectionDiseno"></h3>
    <div class="grid3">
      <div>
        <label data-i18n="labelColor"></label>
        <input type="color" id="color1" value="#88C1B4" />
      </div>
      <div>
        <label data-i18n="labelPorPagina"></label>
        <select id="porPagina" onchange="syncGapFromPorPagina(this.value)">
          <option value="4" data-i18n="opt4"></option>
          <option value="8" data-i18n="opt8"></option>
          <option value="10" selected data-i18n="opt10"></option>
          <option value="12" data-i18n="opt12"></option>
          <option value="14" data-i18n="opt14"></option>
          <option value="15" data-i18n="opt15"></option>
          <option value="16" data-i18n="opt16"></option>
          <option value="18" data-i18n="opt18"></option>
          <option value="20" data-i18n="opt20"></option>
          <option value="21" data-i18n="opt21"></option>
        </select>
      </div>
      <div>
        <label data-i18n="labelFmtNum"></label>
        <select id="fmtNum">
          <option value="3">3 — 001</option>
          <option value="4">4 — 0001</option>
          <option value="5">5 — 00001</option>
        </select>
      </div>
    </div>
    <div style="margin-top: 12px;">
      <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: #333;">
        <input type="checkbox" id="mostrarTalon" style="width: 16px; height: 16px; cursor: pointer;" />
        <span data-i18n="labelTalon"></span>
      </label>
    </div>
    <div class="grid2" style="margin-top: 12px;">
      <div>
        <label data-i18n="labelGap"></label>
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="range" id="fieldGap" min="2" max="24" value="14" step="1" style="flex:1;" oninput="document.getElementById('fieldGapVal').textContent=this.value+'px'" />
          <span id="fieldGapVal" style="font-size:13px; min-width:32px; color:#555;">14px</span>
        </div>
      </div>
      <div>
        <label data-i18n="labelFontSize"></label>
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="range" id="fieldFontSize" min="6" max="14" value="8" step="0.5" style="flex:1;" oninput="document.getElementById('fieldFontSizeVal').textContent=this.value+'px'" />
          <span id="fieldFontSizeVal" style="font-size:13px; min-width:32px; color:#555;">8px</span>
        </div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="generarPreview()">&#9654; <span data-i18n="btnPreview"></span></button>
    <button class="btn" onclick="window.print()">&#128438; <span data-i18n="btnPrint"></span></button>
  </div>

  <div id="previewArea"></div>
</div>

<script>
  const i18n = {
    es: {
      title:       'Generador de cupones para rifa',
      subtitle:    'Completá los datos, elegí el diseño y guardá como PDF desde el botón Imprimir.',
      sectionEvent:'Datos del evento',
      sectionDiseno:'Diseño',
      labelNombre: 'Nombre de la rifa / evento',
      labelOrg:    'Organización',
      labelDesde:  'Numeración desde',
      labelCantidad:'Cantidad de cupones',
      labelColor:  'Color principal',
      labelPorPagina:'Cupones por página',
      labelFmtNum: 'Formato número',
      labelTalon:  'Mostrar talón con número a la derecha',
      opt4:  '4 por página (grande)',
      opt8:  '8 por página (mediano)',
      opt10: '10 por página (chico)',
      opt12: '12 por página (muy chico)',
      btnPreview:  'Vista previa',
      btnPrint:    'Imprimir / Guardar PDF',
      pageLabel:   'Página',
      pageOf:      'de',
      fNombre:     'Nombre',
      fApellido:   'Apellido',
      fDNI:        'DNI',
      fCelular:    'Celular',
      fInstagram:  'Instagram',
      labelGap: 'Espacio entre campos',
      labelFontSize: 'Tamaño de fuente',
      opt14: '14 por página',
      opt15: '15 por página (3 columnas)',
      opt16: '16 por página',
      opt18: '18 por página (3 columnas)',
      opt20: '20 por página',
      opt21: '21 por página (3 columnas)',
    },
    en: {
      title:       'Raffle Coupon Generator',
      subtitle:    'Fill in the details, choose your design, and save as PDF using the Print button.',
      sectionEvent:'Event details',
      sectionDiseno:'Design',
      labelNombre: 'Raffle / event name',
      labelOrg:    'Organization',
      labelDesde:  'Start number',
      labelCantidad:'Number of coupons',
      labelColor:  'Main color',
      labelPorPagina:'Coupons per page',
      labelFmtNum: 'Number format',
      labelTalon:  'Show stub with number on the right',
      opt4:  '4 per page (large)',
      opt8:  '8 per page (medium)',
      opt10: '10 per page (small)',
      opt12: '12 per page (very small)',
      btnPreview:  'Preview',
      btnPrint:    'Print / Save PDF',
      pageLabel:   'Page',
      pageOf:      'of',
      fNombre:     'First name',
      fApellido:   'Last name',
      fDNI:        'ID',
      fCelular:    'Phone',
      fInstagram:  'Instagram',
      labelGap: 'Space between fields',
      labelFontSize: 'Font size',
      opt14: '14 per page',
      opt15: '15 per page (3 columns)',
      opt16: '16 per page',
      opt18: '18 per page (3 columns)',
      opt20: '20 per page',
      opt21: '21 per page (3 columns)',
    }
  };

  let lang = 'es';

  function setLang(l) {
    lang = l;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.lang-btn').forEach(b => { if (b.textContent.toLowerCase().includes(l)) b.classList.add('active'); });
    document.documentElement.lang = l;
    applyI18n();
    generarPreview();
  }

  function applyI18n() {
    const t = i18n[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.textContent = t[key];
    });
    document.title = t.title;
  }

  const gapDefaults = {4:24, 8:24, 10:14, 12:7, 14:2, 15:14, 16:2, 18:5, 20:2, 21:2};

  function syncGapFromPorPagina(val) {
    const pp = parseInt(val);
    if (gapDefaults[pp] !== undefined) {
      const slider = document.getElementById('fieldGap');
      slider.value = gapDefaults[pp];
      document.getElementById('fieldGapVal').textContent = gapDefaults[pp] + 'px';
    }
    // Round cantidad up to next multiple of pp to fill the page
    const cantidadEl = document.getElementById('cantidad');
    const current = parseInt(cantidadEl.value) || pp;
    const rounded = Math.ceil(current / pp) * pp;
    cantidadEl.value = rounded;
  }

  function pad(n, d) { return String(n).padStart(d, '0'); }

  function generarPreview() {
    const t      = i18n[lang];
    const nombre = document.getElementById('rifaNombre').value || 'Rifa';
    const org    = document.getElementById('rifaOrg').value || '';
    const desde  = parseInt(document.getElementById('numDesde').value) || 1;
    const cantidad = Math.min(parseInt(document.getElementById('cantidad').value) || 10, 500);
    const color  = document.getElementById('color1').value;
    const porPag = parseInt(document.getElementById('porPagina').value);
    const digits = parseInt(document.getElementById('fmtNum').value);
    const mostrarTalon = document.getElementById('mostrarTalon').checked;
    const fieldGap      = document.getElementById('fieldGap').value;
    const fieldFontSize = document.getElementById('fieldFontSize').value;

    const paginas = Math.ceil(cantidad / porPag);
    const cols = porPag <= 4 ? 1 : (porPag === 21 || porPag === 18 || porPag === 15) ? 3 : 2;
    const rows = Math.ceil(porPag / cols);
    let html = '';

    for (let p = 0; p < paginas; p++) {
      html += `<div class="preview-wrap"><p class="preview-label">${t.pageLabel} ${p+1} ${t.pageOf} ${paginas}</p>
        <div class="a4-page" style="grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr);">`;

      for (let i = 0; i < porPag; i++) {
        const idx = p * porPag + i;
        if (idx >= cantidad) { html += '<div></div>'; continue; }
        const num = pad(desde + idx, digits);
        html += `
          <div class="coupon">
            <div class="coupon-band" style="background:${color};flex-basis:${cols === 3 ? 28 : 52}px;">${org}</div>
            <div class="coupon-main">
              <div class="coupon-org" style="color:${color}">${org.toUpperCase()}</div>
              <div class="coupon-number" style="color:${color}">#${num}</div>
              <div class="coupon-name">${nombre}</div>
              <div class="coupon-fields">
                <div class="coupon-field"><span class="field-label">${t.fNombre}</span><span class="field-line"></span></div>
                <div class="coupon-field"><span class="field-label">${t.fApellido}</span><span class="field-line"></span></div>
                <div class="coupon-field"><span class="field-label">${t.fDNI}</span><span class="field-line"></span></div>
                <div class="coupon-field"><span class="field-label">${t.fCelular}</span><span class="field-line"></span></div>
                <div class="coupon-field"><span class="field-label">${t.fInstagram}</span><span class="field-line"></span></div>
              </div>
            </div>
            ${mostrarTalon ? `<div class="coupon-stub"><span class="stub-num" style="color:${color}">#${num}</span></div>` : ''}
          </div>`;
      }
      html += '</div></div>';
    }

    document.getElementById('previewArea').innerHTML = '';
    document.getElementById('previewArea').innerHTML = html;

    // Apply gap and font size directly after render
    const resolvedGap = parseInt(document.getElementById('fieldGap').value);
    const resolvedFont = parseFloat(document.getElementById('fieldFontSize').value);
    document.querySelectorAll('.coupon-fields').forEach(el => el.style.setProperty('gap', resolvedGap + 'px', 'important'));
    document.querySelectorAll('.field-label').forEach(el => el.style.setProperty('font-size', resolvedFont + 'px', 'important'));

    const alturaFactor = porPag >= 20 ? 0.82
                         : porPag >= 18 ? 0.84
                         : porPag >= 16 ? 0.85
                         : porPag >= 15 ? 0.87
                         : porPag >= 14 ? 0.87
                         : porPag >= 10 ? 0.90
                         : 1.0;
    document.querySelectorAll('.a4-page').forEach(page => {
      const w = page.offsetWidth;
      const h = Math.round(w * 297 / 210 * alturaFactor);
      page.style.height = h + 'px';
    });
  }

  applyI18n();
  syncGapFromPorPagina(document.getElementById('porPagina').value);
  generarPreview();
</script>
</body>
</html>
